<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontastic | Global Font Market & Custom Design</title>
    <meta name="description"
        content="Generate stylish fonts, neon text, 3D effects and more with Fontastic. The ultimate font generator for logos, thumbnails and social media.">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="style.css">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://fontastic.web.app/">
    <meta property="og:title" content="Fontastic | Global Font Market & Custom Design">
    <meta property="og:description" content="Generate stylish fonts, neon text, 3D effects and more with Fontastic.">
    <meta property="og:image" content="https://fontastic.web.app/favicon.svg">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://fontastic.web.app/">
    <meta property="twitter:title" content="Fontastic | Global Font Market & Custom Design">
    <meta property="twitter:description"
        content="Generate stylish fonts, neon text, 3D effects and more with Fontastic.">
    <meta property="twitter:image" content="https://fontastic.web.app/favicon.svg">

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Fontastic",
      "operatingSystem": "All",
      "applicationCategory": "DesignApplication",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "description": "Generate stylish fonts, neon text, 3D effects and more with Fontastic."
    }
    </script>
</head>

<body class="home-page">
    <header class="site-header">
        <h1 class="logo-h1">
            <a href="/" class="logo-wrapper" aria-label="Fontastic Home">
                <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M12 20h9" stroke="#EA4335" />
                    <path d="M16.5 3.5a2.1 2.1 0 013 3L7 19" stroke="#4285F4" />
                    <path d="M7 19l-4 1 1-4" stroke="#FBBC05" />
                    <path d="M4 16l12.5-12.5" stroke="#4285F4" />
                </svg>
                <span class="site-logo">Fontastic</span>
            </a>
        </h1>
    </header>

    <section class="hero-section">
        <h2 class="tagline">Create fantastic text logos with Fontastic.</h2>
        <div class="input-container">
            <div class="fontastic-search">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 20h9"></path>
                    <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                </svg>
                <input type="text" id="previewTextInput" placeholder="Type text to preview fonts...">
            </div>
            <div class="fontastic-search">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="fontSearchInput" placeholder="Search fonts...">
            </div>
        </div>
    </section>

    <main>
        <div id="font-grid"></div>
    </main>

    <footer>
        <nav class="footer-links">
            <a href="/privacy">Privacy</a>
            <a href="/terms">Terms</a>
            <a href="/about">About</a>
            <a href="/guides">Guides</a>
            <a href="/contact">Contact</a>
        </nav>
        <p>&copy; 2026 Fontastic. All rights reserved.</p>
    </footer>

    <script type="module" src="js/homeGallery.js"></script>
</body>

</html>
