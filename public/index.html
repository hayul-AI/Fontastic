<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontastic | Home of 60+ Stylish Fonts</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="home-page">
    <header class="site-header">
        <a href="/" class="logo-wrapper">
            <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 20h9" />
                <path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4 12.5-12.5z" />
            </svg>
            <span class="site-logo">Fontastic</span>
        </a>
    </header>

    <section class="hero-section">
        <p class="tagline">Generate Beautiful Text Logos Instantly</p>
        <div class="input-container">
            <div class="fontastic-search">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 20h9"></path>
                    <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                </svg>
                <input type="text" id="previewTextInput" placeholder="Type text to preview fonts...">
            </div>
            <div class="fontastic-search">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="fontSearchInput" placeholder="Search fonts...">
            </div>
        </div>
    </section>

    <main>
        <div id="font-grid"></div>
    </main>

    <footer>
        <nav class="footer-links">
            <a href="/privacy">Privacy</a>
            <a href="/terms">Terms</a>
            <a href="/about">About</a>
            <a href="/guides">Guides</a>
            <a href="/contact">Contact</a>
        </nav>
        <p>&copy; 2026 Fontastic. All rights reserved.</p>
    </footer>

    <script type="module" src="js/homeGallery.js"></script>
</body>

</html>
